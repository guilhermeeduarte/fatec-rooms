services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatec-rooms-backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT:-3306}/${DB_NAME}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-noreply@fatecrooms.com.br}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fatec-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fatec-rooms-frontend
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - fatec-net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: fatec-rooms-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - fatec-net
    restart: unless-stopped

networks:
  fatec-net:
    driver: bridge