services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: fatec-rooms-backend-dev
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT:-3306}/${DB_NAME}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      - maven_cache:/root/.m2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fatec-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: fatec-rooms-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - fatec-net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: fatec-rooms-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - fatec-net
    restart: unless-stopped

networks:
  fatec-net:
    driver: bridge

volumes:
  maven_cache: